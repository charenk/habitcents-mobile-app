name: Claude Code

# Responds to @claude in issue and PR comments. Owner-scoped so only Charen
# can trigger it (tester/QA comments are ignored). Runs in GitHub's cloud,
# laptop-independent. Bills the Anthropic Console API key, not the subscription.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Only the repo owner can trigger Claude; ignore everyone else.
    if: github.event.comment.user.login == github.repository_owner && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 15"
